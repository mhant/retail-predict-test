name = "retail-predict-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"

# D1 database binding — DB is how the Worker references the database
[[d1_databases]]
binding = "DB"
database_name = "retail-predict"
database_id = "35a978cb-e8cf-48b5-9d1a-7375677b9493"

# WRITE_TOKEN is set as a Wrangler secret (not stored here):
#   wrangler secret put WRITE_TOKEN
# The scraper sends this in the Authorization: Bearer header.
