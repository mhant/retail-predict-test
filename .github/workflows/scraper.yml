name: M3-M6 — Scraper Pipeline

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily  (~4 AM ET / 9 AM London)
    - cron: '0 20 * * *'  # 20:00 UTC daily  (~4 PM ET / 9 PM London)
  workflow_dispatch:        # manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Secrets come from Repository secrets (not environment secrets)
    # so scheduled cron triggers are not gated by environment protection rules.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-scraper.txt

      - name: Install dependencies
        run: pip install -r requirements-scraper.txt

      - name: Run pipeline
        run: python -m scraper.pipeline
        env:
          WORKER_URL:   ${{ secrets.WORKER_URL }}
          WRITE_TOKEN:  ${{ secrets.WRITE_TOKEN }}
